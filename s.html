<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>staff · cosmo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;
  --panel:rgba(20,20,28,.7);
  --panel-solid:#16161e;
  --line:rgba(255,255,255,.08);
  --line-bright:rgba(255,255,255,.14);
  --txt:#e8eaf2;
  --mute:#8a8f9c;
  --dim:#54596a;
  --purple:#8838d4;
  --blue:#4285F4;
  --discord:#5865F2;
  --green:#22c55e;
  --red:#ef4444;
  --gold:#fbbf24;
  --lime:#8fce00;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit;}

.bg{position:fixed;inset:0;z-index:0;background:
  radial-gradient(ellipse 70% 50% at 30% 0%,rgba(80,60,140,.18),transparent 60%),
  radial-gradient(ellipse 60% 50% at 70% 100%,rgba(40,60,120,.15),transparent 60%);}

.stage{position:relative;z-index:5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 20px;}
.card{width:min(420px,94vw);background:var(--panel);backdrop-filter:blur(40px) saturate(120%);
  -webkit-backdrop-filter:blur(40px) saturate(120%);border:1px solid var(--line);border-radius:20px;
  padding:0 0 24px;text-align:center;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.6);}

.banner{height:120px;position:relative;background:#1a1a24;}
.banner::before{content:"";position:absolute;inset:0;background:
  radial-gradient(ellipse 80% 100% at 20% 100%,rgba(136,56,212,.25),transparent 70%),
  radial-gradient(ellipse 60% 100% at 80% 0%,rgba(66,133,244,.18),transparent 70%);}
.banner-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.4;mix-blend-mode:soft-light;}

.av-wrap{position:relative;width:96px;height:96px;margin:-48px auto 12px;}
.avatar{width:100%;height:100%;border-radius:50%;overflow:hidden;border:4px solid var(--panel-solid);background:#1a1a24;
  box-shadow:0 8px 24px rgba(0,0,0,.5);}
.avatar img,.avatar .ph{width:100%;height:100%;object-fit:cover;display:flex;align-items:center;justify-content:center;}
.avatar .ph{background:linear-gradient(135deg,#3b3658,#1f1c33);font-size:1.7rem;font-weight:700;color:#e8eaf2;}
.av-status{position:absolute;bottom:2px;right:2px;width:20px;height:20px;border-radius:50%;background:var(--green);border:3px solid var(--panel-solid);}
.av-status.away{background:var(--gold);}
.av-status.dnd{background:var(--red);}
.av-status.off{background:var(--dim);}

.name-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:0 24px;}
.name{font-size:1.5rem;font-weight:700;letter-spacing:-.4px;}
.verify svg{width:16px;height:16px;fill:var(--blue);vertical-align:-2px;}
.handle{font-size:.8rem;color:var(--mute);font-weight:500;margin-top:4px;}
.role-inline{display:inline-block;padding:1px 7px;border-radius:4px;font-size:.62rem;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-left:6px;vertical-align:middle;}
.role-owner{background:rgba(251,191,36,.1);color:#e0b352;border:1px solid rgba(251,191,36,.25);}
.role-admin{background:rgba(239,68,68,.1);color:#e07070;border:1px solid rgba(239,68,68,.25);}
.role-mod{background:rgba(136,56,212,.1);color:#b888ec;border:1px solid rgba(136,56,212,.3);}
.role-support{background:rgba(66,133,244,.1);color:#7eb0ff;border:1px solid rgba(66,133,244,.3);}
.role-dev{background:rgba(143,206,0,.1);color:#a8d854;border:1px solid rgba(143,206,0,.3);}
.role-vip{background:rgba(168,85,247,.1);color:#c4a8ff;border:1px solid rgba(168,85,247,.3);}

.status-pill{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:4px 10px;border-radius:6px;
  background:rgba(255,255,255,.04);border:1px solid var(--line);font-size:.7rem;font-weight:500;color:var(--mute);}
.status-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
.status-pill.away .dot{background:var(--gold);}
.status-pill.dnd .dot{background:var(--red);}
.status-pill.off .dot{background:var(--dim);}

.bio{padding:14px 30px 16px;color:var(--mute);font-size:.88rem;line-height:1.6;}

.stats{display:flex;justify-content:center;gap:32px;padding:0 28px 18px;}
.stat .v{font-size:1.05rem;font-weight:600;color:#fff;}
.stat .l{font-size:.62rem;color:var(--mute);letter-spacing:1.5px;text-transform:uppercase;font-weight:500;margin-top:3px;}

.divider{height:1px;background:var(--line);margin:0 30px 18px;}

.socials{display:flex;justify-content:center;gap:6px;padding:0 30px 16px;flex-wrap:wrap;}
.s-icon{display:flex;align-items:center;justify-content:center;width:34px;height:34px;
  background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:8px;color:var(--mute);transition:all .15s;}
.s-icon svg{width:13px;height:13px;fill:currentColor;}
.s-icon:hover{color:#fff;border-color:var(--line-bright);background:rgba(255,255,255,.06);}

.links{display:flex;flex-direction:column;gap:6px;padding:0 24px;}
.link{display:flex;align-items:center;gap:11px;padding:12px 14px;background:rgba(255,255,255,.03);
  border:1px solid var(--line);border-radius:10px;font-size:.85rem;font-weight:500;color:#e8eaf2;
  transition:border-color .15s,background .15s;}
.link:hover{border-color:var(--line-bright);background:rgba(255,255,255,.05);}
.link.discord:hover{border-color:rgba(88,101,242,.5);background:rgba(88,101,242,.08);}
.link svg.lico{width:15px;height:15px;flex-shrink:0;fill:var(--mute);}
.link:hover svg.lico{fill:#fff;}
.link span{flex:1;text-align:left;}
.link svg.arr{opacity:.3;transition:opacity .15s,transform .15s;width:13px;height:13px;fill:currentColor;}
.link:hover svg.arr{opacity:.8;transform:translateX(2px);}

.foot{padding:14px 24px 0;font-size:.62rem;letter-spacing:2px;color:var(--dim);text-transform:uppercase;font-weight:500;}

.toast{position:fixed;bottom:24px;left:50%;transform:translate(-50%,20px);z-index:300;
  background:rgba(20,20,28,.95);backdrop-filter:blur(14px);border:1px solid var(--line-bright);
  color:#fff;padding:11px 18px;border-radius:10px;font-size:.82rem;font-weight:500;
  box-shadow:0 8px 30px rgba(0,0,0,.6);
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;}
.toast.show{opacity:1;transform:translate(-50%,0);}

.error{max-width:400px;margin:80px auto;padding:30px;text-align:center;color:var(--mute);}
.error h2{font-size:1.4rem;color:#fff;margin-bottom:8px;}
.error a{color:#b888ec;}
</style>
</head>
<body>

<div class="bg"></div>

<div class="stage">
  <div class="card" id="card"></div>
</div>

<script>
const SVG = {
  discord:'<svg class="lico" viewBox="0 0 24 24"><path d="M19.27 5.33C17.94 4.71 16.5 4.26 15 4l-.19.39c1.5.36 2.96.96 4.31 1.78A14 14 0 0 0 5.88 6.17C7.23 5.36 8.69 4.75 10.19 4.39L10 4c-1.5.26-2.93.71-4.27 1.33C2.69 9.34 1.83 13.32 2.27 17.27c1.79 1.32 3.83 2.13 5.97 2.49.4-.55.76-1.13 1.06-1.74-.59-.22-1.16-.5-1.7-.83l.41-.32c3.42 1.6 7.13 1.6 10.5 0l.41.32c-.54.33-1.11.61-1.7.83.3.61.66 1.19 1.06 1.74 2.14-.36 4.18-1.17 5.97-2.49.5-4.49-1-8.55-3.78-11.94zM8.52 14.91c-1.03 0-1.89-.95-1.89-2.12 0-1.17.84-2.12 1.89-2.12 1.06 0 1.9.96 1.89 2.12 0 1.17-.84 2.12-1.89 2.12zm6.97 0c-1.03 0-1.89-.95-1.89-2.12 0-1.17.84-2.12 1.89-2.12 1.06 0 1.9.96 1.89 2.12 0 1.17-.83 2.12-1.89 2.12z"/></svg>',
  x:'<svg class="lico" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231z"/></svg>',
  telegram:'<svg class="lico" viewBox="0 0 24 24"><path d="M12 0C5.374 0 0 5.373 0 12s5.374 12 12 12 12-5.373 12-12S18.626 0 12 0zm5.568 8.16c-.169 1.858-.896 6.728-1.268 9.07-.158 1.045-.467 1.4-.766 1.428-.654.06-1.151-.432-1.785-.847-.99-.65-1.55-1.054-2.51-1.687-1.11-.731-.39-1.133.244-1.79.166-.171 3.044-2.79 3.1-3.027.007-.03.013-.14-.052-.198s-.16-.038-.228-.022c-.097.022-1.642 1.043-4.633 3.063-.438.301-.835.448-1.19.44-.392-.008-1.146-.221-1.706-.403-.687-.224-1.232-.342-1.185-.722.025-.198.297-.4.819-.609 3.207-1.397 5.345-2.318 6.414-2.764 3.054-1.27 3.688-1.49 4.102-1.498.09-.001.293.021.425.13.111.092.142.215.157.302.014.087.032.286.018.441z"/></svg>',
  instagram:'<svg class="lico" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>',
  youtube:'<svg class="lico" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993z"/></svg>'
};

const STATUS_TEXT = {online:'Active now',away:'Away',dnd:'Do not disturb',off:'Offline'};

function initials(n){return (n||'?').split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();}

function showToast(msg){
  let t = document.getElementById('toast');
  if(!t){ t = document.createElement('div'); t.id='toast'; t.className='toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tm);
  t._tm = setTimeout(()=>t.classList.remove('show'), 2400);
}

async function load(){
  const params = new URLSearchParams(location.search);
  const slug = params.get('u') || 'vex';
  let DB;
  try{
    const r = await fetch('staff.json?t='+Date.now());
    DB = await r.json();
  }catch(e){
    document.getElementById('card').innerHTML = `<div class="error"><h2>error</h2><p>could not load staff.json</p></div>`;
    return;
  }
  const p = DB.staff[slug];
  if(!p){
    const list = Object.keys(DB.staff).map(k=>`<a href="?u=${k}">${k}</a>`).join(', ');
    document.getElementById('card').innerHTML = `<div class="error"><h2>404 · ${slug} not found</h2><p>available: ${list}</p></div>`;
    return;
  }

  document.title = `${p.name} · cosmo`;
  const av = p.avatar ? `<img src="${p.avatar}"/>` : `<div class="ph">${initials(p.name)}</div>`;
  const verify = p.verified ? `<span class="verify"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg></span>` : '';
  const banner = p.banner ? `<div class="banner-bg" style="background-image:url('${p.banner}')"></div>` : '';
  const status = p.status||'online';
  const st = p.stats||{};

  const ticketUrl = DB.discordTicketUrl || '#';
  const mention = p.discordId ? `<@${p.discordId}>` : `@${p.handle}`;

  document.getElementById('card').innerHTML = `
    <div class="banner">${banner}</div>
    <div class="av-wrap">
      <div class="avatar">${av}</div>
      <div class="av-status ${status}"></div>
    </div>
    <div class="name-row"><h1 class="name">${p.name}</h1>${verify}</div>
    <div class="handle">@${p.handle}${p.role?` · <span class="role-inline role-${p.roleColor||'mod'}">${p.role}</span>`:''}</div>
    <div><span class="status-pill ${status}"><span class="dot"></span>${STATUS_TEXT[status]}</span></div>
    ${p.bio?`<div class="bio">${p.bio}</div>`:''}
    ${(st.tickets||st.rating||st.since)?`<div class="stats">
      ${st.tickets?`<div class="stat"><div class="v">${st.tickets}</div><div class="l">tickets</div></div>`:''}
      ${st.rating?`<div class="stat"><div class="v">${st.rating}</div><div class="l">rating</div></div>`:''}
      ${st.since?`<div class="stat"><div class="v">${st.since}</div><div class="l">since</div></div>`:''}
    </div>`:''}
    <div class="divider"></div>
    ${(p.socials||[]).length?`<div class="socials">${p.socials.map(s=>{
      const svg = (SVG[s.icon]||SVG.discord).replace('class="lico"','');
      return `<a class="s-icon" href="${s.url||'#'}" target="_blank" rel="noopener">${svg}</a>`;
    }).join('')}</div>`:''}
    <div class="links">
      <a class="link discord" href="${ticketUrl}" target="_blank" id="dmBtn">
        ${SVG.discord}<span>DM on Discord</span>
        <svg class="arr" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
      </a>
      <a class="link" href="${ticketUrl}" target="_blank" id="ticketBtn">
        <svg class="lico" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6zm8 5H6v-2h8zm4-6H6V6h12z"/></svg>
        <span>Open Ticket</span>
        <svg class="arr" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
      </a>
    </div>
    <div class="foot">cosmo · 2026</div>`;

  const message = `hey there can you help me ${mention}`;
  ['dmBtn','ticketBtn'].forEach(id=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('click', async (e)=>{
      e.preventDefault();
      try{ await navigator.clipboard.writeText(message); }catch(err){}
      showToast('message copied — paste with Ctrl+V in Discord');
      setTimeout(()=>window.open(ticketUrl,'_blank'), 600);
    });
  });
}
load();
</script>
</body>
</html>
